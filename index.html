<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <title>ZYAAN - Beauty store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #87CEEB;
            color: #f0f8ff;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product-card {
            background-color: white;
            border: 2px solid #87CEEB;
            border-radius: 10px;
            width: 250px;
            margin: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e0e0e0;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .price {
            color: #0077be;
            font-weight: bold;
            font-size: 1.2em;
        }

        button {
            background-color: #87CEEB;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 1em;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #5ba3d0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .form-group {
            margin: 15px 0;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            background-color: #4CAF50;
            width: 100%;
            padding: 12px;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .modal h2 {
            text-align: center;
            color: #87CEEB;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <header>
        <h1>WELCOME TO ZYAAN - BEAUTY STORE</h1>
        <h3>WE PROVIDE THE BEST BEAUTY PRODUCTS WITH AUTHENTICITY</h3>
    </header>
    <div class="container">
        <div class="product-card">
            <img src="https://via.placeholder.com/200x200/FFE4E1/8B4513?text=ZYAAN+FOUNDATION" alt="ZYAAN FOUNDATION" width="200" height="200">
            <h2>ZYAAN FOUNDATION</h2>
            <p class="price">৳ 1499</p>
            <button onclick="openModal('ZYAAN FOUNDATION', '৳ 1499')">BUY NOW</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/200x200/FFC0CB/8B0000?text=ZYAAN+LIPSTICK" alt="ZYAAN LIPSTICK" width="200" height="200">
            <h2>ZYAAN LIPSTICK</h2>
            <p class="price">৳ 799</p>
            <button onclick="openModal('ZYAAN LIPSTICK', '৳ 799')">BUY NOW</button>
        </div>
        <div class="product-card">
            <img src="https://via.placeholder.com/200x200/FFD700/654321?text=ZYAAN+MASCARA" alt="ZYAAN MASCARA" width="200" height="200">
            <h2>ZYAAN MASCARA</h2>
            <p class="price">৳ 699</p>
            <button onclick="openModal('ZYAAN MASCARA', '৳ 699')">BUY NOW</button>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>অর্ডার ফর্ম</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>পণ্যের নাম:</label>
                    <input type="text" id="productName" readonly>
                </div>
                <div class="form-group">
                    <label>মূল্য:</label>
                    <input type="text" id="productPrice" readonly>
                </div>
                <div class="form-group">
                    <label>আপনার নাম:</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label>ইমেইল:</label>
                    <input type="email" id="customerEmail" required>
                </div>
                <div class="form-group">
                    <label>ফোন নম্বর:</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label>ঠিকানা:</label>
                    <textarea id="customerAddress" required></textarea>
                </div>
                <button type="submit" class="submit-btn">অর্ডার নিশ্চিত করুন</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(productName, productPrice) {
            document.getElementById('productName').value = productName;
            document.getElementById('productPrice').value = productPrice;
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productName = document.getElementById('productName').value;
            const productPrice = document.getElementById('productPrice').value;
            const customerName = document.getElementById('customerName').value;
            const customerEmail = document.getElementById('customerEmail').value;
            const customerPhone = document.getElementById('customerPhone').value;
            const customerAddress = document.getElementById('customerAddress').value;

            const orderMessage = `নতুন অর্ডার:\n\nপণ্য: ${productName}\nমূল্য: ${productPrice}\n\nগ্রাহক তথ্য:\nনাম: ${customerName}\nইমেইল: ${customerEmail}\nফোন: ${customerPhone}\nঠিকানা: ${customerAddress}`;

            alert('ধন্যবাদ! আপনার অর্ডার গ্রহণ করা হয়েছে।\n\n' + orderMessage);
            
            document.getElementById('orderForm').reset();
            closeModal();
        });
    </script>
</body>

</html>
